version: "3.9"

services:
  app:
    build: .
    image: pizzaria-api:local
    container_name: pizzaria-api

    ports:
      - 8000:8000

    env_file:
      - .env
      - .env.development

    depends_on:
      - mysql

  mysql:
    image: mysql:latest
    container_name: pizzaria-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: pizzaria

    ports:
      - 3308:3306

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
