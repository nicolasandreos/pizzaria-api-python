name: Deploy Pizzaria API

on:
  push:
    branches:
      - main

env:
  ACR_NAME: pizzariaacr
  IMAGE_NAME: pizzaria-api
  CONTAINER_APP_NAME: pizzaria-container
  RESOURCE_GROUP: pizzaria

jobs:
  deploy:
    runs-on: ubuntu-latest

permissions:
  id-token: write
  contents: read

steps:
  - name: Checkout código
    uses: actions/checkout@v4

  - name: Login Azure
    uses: azure/login@v2
    with:
      creds: ${{ secrets.AZURE_CREDENTIALS }}

  - name: Login ACR
    run: |
      az acr login --name $ACR_NAME

  - name: Build imagem
    run: |
      docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} .

  - name: Push imagem
    run: |
      docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

  - name: Atualizar Container App
    run: |
      az containerapp update \
        --name $CONTAINER_APP_NAME \
        --resource-group $RESOURCE_GROUP \
        --image $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
